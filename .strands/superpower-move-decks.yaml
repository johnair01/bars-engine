name: superpower-move-decks
description: >-
  Generate the six Superpower move-decks (Strategist, Connector, Escape Artist,
  Disruptor, Alchemist, Storyteller) as canonical Techniques tagged
  superpowers:[<sp>]. Each superpower gets its own version of the 5 basic moves,
  a move at each of the 6 altitude levels (Shaman->Sage), and a signature inner
  + outer move — making the 2-slot loadout (inner/outer allyship) functional and
  giving every deck card a class-specific reading. Sourced from the MTGOA work
  and the existing allyship deck grammar.
