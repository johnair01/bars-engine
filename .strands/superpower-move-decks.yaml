name: superpower-move-decks
description: >-
  Define the six Superpower expansion decks (Strategist, Connector, Escape
  Artist, Disruptor, Alchemist, Storyteller). Each is a standalone 60-card pack
  = 5 basic moves x 6 levels (Shaman->Sage) x 2 aspects (inner/outer). These are
  NOT merged into the 120-card base Allyship Deck or its technique pool; they are
  add-on expansion packs. The base experience cites where a superpower card
  applies and invites the player to get that superpower's deck. Superpowers are
  an orienting add-on, deliberately moved out of the book/base.
