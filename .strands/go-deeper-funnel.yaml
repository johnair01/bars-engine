name: go-deeper-funnel
description: >-
  End-to-end "Go Deeper" funnel: a free anonymous superpower quiz (produces an
  inner+outer loadout, login to save) -> deck purchase that includes the buyer's
  inner pack (deferred grant on loadout-save) -> on any Allyship Deck card, a
  Go Deeper affordance that surfaces the player's matching superpower move
  (owner) or cites it with an outer-pack upsell (non-owner). Wires the existing
  technique-library resolver/citation to the live deck UI, auth, and entitlement
  spine. Packaging: loadout bundle (deck + both packs, discounted) is the
  headline; outer pack is the post-deck upsell.
type: feature
