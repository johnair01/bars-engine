api:
  default_provider: anthropic
  anthropic:
    api_key: ${ANTHROPIC_API_KEY}
    model: claude-sonnet-4-5-20250929-v1:0
    max_tokens: 8192
    temperature: 0.7
defaults:
  type: feature
  status: active
  fork_space:
    allowed_paths:
    - src/
    - tests/
    excluded_paths:
    - '**/__pycache__/'
    - '*.pyc'
    file_patterns:
    - '*.py'
    - '*.md'
    - '*.json'
repository:
  root: .
  strands_dir: .strands
