openapi: 3.1.1
info:
  title: BARS Engine — Books context API
  description: |
    Admin books catalog and generated library quests for ChatGPT Actions / external tools.
    Set `BOOKS_CONTEXT_API_KEY` on the server; use Bearer token in requests.
    See docs/BOOKS_CONTEXT_API.md and docs/BOOKS_CHUNK_TAGS_API.md (Sage slice: GM face + optional hexagram per text range).
  version: 1.3.0

servers:
  - url: https://bars-engine.vercel.app
    description: Production (no trailing slash)

security:
  - bearerAuth: []

paths:
  /api/admin/books:
    get:
      operationId: listBooks
      summary: List all books (no full PDF text)
      parameters:
        - name: compact
          in: query
          description: If 1, return minimal fields only
          schema:
            type: string
            enum:
              - "0"
              - "1"
            default: "0"
      responses:
        "200":
          description: Books list
          content:
            application/json:
              schema:
                type: object
                properties:
                  books:
                    type: array
                    items:
                      $ref: "#/components/schemas/BookListItem"
                  count:
                    type: integer
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /api/admin/books/{id}:
    get:
      operationId: getBook
      summary: Get one book by ID
      parameters:
        - name: id
          in: path
          required: true
          description: Book CUID
          schema:
            type: string
        - name: extractedText
          in: query
          description: If 1, include extracted PDF text (truncated)
          schema:
            type: string
            enum:
              - "0"
              - "1"
            default: "0"
        - name: maxChars
          in: query
          description: Max characters of extracted text (default 80000, max 500000)
          schema:
            type: integer
            default: 80000
        - name: startChar
          in: query
          description: When extractedText=1, slice from this character offset (0-based, inclusive)
          schema:
            type: integer
        - name: endChar
          in: query
          description: When extractedText=1, slice up to this character offset (exclusive); omit for EOF after startChar
          schema:
            type: integer
      responses:
        "200":
          description: Single book
          content:
            application/json:
              schema:
                type: object
                properties:
                  book:
                    $ref: "#/components/schemas/BookDetail"
        "404":
          description: Book not found
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /api/admin/books/{id}/chunk-tags:
    get:
      operationId: listBookChunkTags
      summary: List chunk tags (Game Master face + optional hexagram per char range)
      description: |
        Sage-slice: deterministic `charStart`/`charEnd` relative to `Book.extractedText`.
        Optional `face` query filters by one of the six GM faces.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: face
          in: query
          required: false
          description: Filter by gameMasterFace
          schema:
            type: string
            enum:
              - shaman
              - challenger
              - regent
              - architect
              - diplomat
              - sage
      responses:
        "200":
          description: Tags for this book
          content:
            application/json:
              schema:
                type: object
                properties:
                  bookId:
                    type: string
                  count:
                    type: integer
                  tags:
                    type: array
                    items:
                      $ref: "#/components/schemas/BookChunkTag"
        "404":
          description: Book not found
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
    put:
      operationId: putBookChunkTags
      summary: Replace all chunk tags for this book
      description: |
        Full replace: deletes existing tags for the book, then inserts the provided array (max 2000).
        Same auth as GET (BOOKS_CONTEXT_API_KEY).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - tags
              properties:
                tags:
                  type: array
                  items:
                    $ref: "#/components/schemas/BookChunkTagInput"
      responses:
        "200":
          description: Replaced
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  bookId:
                    type: string
                  count:
                    type: integer
                  message:
                    type: string
        "400":
          description: Validation error
        "404":
          description: Book not found
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /api/admin/books/{id}/quests:
    get:
      operationId: listBookGeneratedQuests
      summary: Generated quests from book analysis (draft/active library quests)
      parameters:
        - name: id
          in: path
          required: true
          description: Book CUID
          schema:
            type: string
        - name: status
          in: query
          description: Filter by quest status
          schema:
            type: string
            enum:
              - draft
              - active
              - archived
              - all
            default: all
        - name: compact
          in: query
          description: If 1, id/title/status/moveType only
          schema:
            type: string
            enum:
              - "0"
              - "1"
            default: "0"
      responses:
        "200":
          description: Quests for this book
          content:
            application/json:
              schema:
                type: object
                properties:
                  bookId:
                    type: string
                  bookTitle:
                    type: string
                  bookSlug:
                    type: string
                  quests:
                    type: array
                    items:
                      $ref: "#/components/schemas/GeneratedQuest"
                  count:
                    type: integer
        "400":
          description: Invalid query parameter
        "404":
          description: Book not found
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API key
      description: Value of BOOKS_CONTEXT_API_KEY from server environment

  responses:
    Unauthorized:
      description: Missing or invalid Bearer token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorBody"
    ServiceUnavailable:
      description: BOOKS_CONTEXT_API_KEY not configured on server
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorBody"

  schemas:
    ErrorBody:
      type: object
      properties:
        error:
          type: string

    BookListItem:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        author:
          type: string
          nullable: true
        slug:
          type: string
        sourcePdfUrl:
          type: string
          nullable: true
        status:
          type: string
        metadataJson:
          type: string
          nullable: true
        createdAt:
          type: string
        updatedAt:
          type: string
        threadId:
          type: string
          nullable: true
      required:
        - id
        - title
        - slug
        - status

    BookDetail:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        author:
          type: string
          nullable: true
        slug:
          type: string
        sourcePdfUrl:
          type: string
          nullable: true
        status:
          type: string
        metadataJson:
          type: string
          nullable: true
        createdAt:
          type: string
        updatedAt:
          type: string
        threadId:
          type: string
          nullable: true
        extractedText:
          type: string
          nullable: true
        extractedTextTruncated:
          type: boolean
        extractedTextCharCount:
          type: integer
      required:
        - id
        - title
        - slug
        - status
        - createdAt
        - updatedAt

    GeneratedQuest:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
          nullable: true
        status:
          type: string
        moveType:
          type: string
          nullable: true
        allyshipDomain:
          type: string
          nullable: true
        nation:
          type: string
          nullable: true
        archetype:
          type: string
          nullable: true
        kotterStage:
          type: string
          nullable: true
        lockType:
          type: string
          nullable: true
        visibility:
          type: string
          nullable: true
        isSystem:
          type: boolean
        createdAt:
          type: string
      required:
        - id
        - title
        - status

    BookChunkTag:
      type: object
      properties:
        id:
          type: string
        charStart:
          type: integer
        charEnd:
          type: integer
        gameMasterFace:
          type: string
        hexagramId:
          type: integer
          nullable: true
        metadata:
          nullable: true
        createdAt:
          type: string
        updatedAt:
          type: string

    BookChunkTagInput:
      type: object
      required:
        - charStart
        - charEnd
        - gameMasterFace
      properties:
        charStart:
          type: integer
          minimum: 0
        charEnd:
          type: integer
          minimum: 0
        gameMasterFace:
          type: string
          enum:
            - shaman
            - challenger
            - regent
            - architect
            - diplomat
            - sage
        hexagramId:
          type: integer
          minimum: 1
          maximum: 64
          nullable: true
        metadata:
          type: object
          additionalProperties: true
