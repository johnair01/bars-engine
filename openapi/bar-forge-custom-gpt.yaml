openapi: 3.1.1
info:
  title: BARS Engine — BAR Forge + GM Quest API (Custom GPT)
  description: |
    **Import this file into Custom GPT Actions** — single schema for BAR Forge **and** Game Master quest routes.

    **BAR Forge:** match BAR → quests, list/save BAR registry (`BARS_API_KEY`, Bearer). **`GET /api/quests`** lists matchable quests; **`POST /api/quests`** persists generated quest registry rows (BAR Forge output); **`GET /api/quests/registry/{id}`** fetches by id. See docs/BAR_FORGE_API.md.

    **Game Master (new):** collective campaign snapshot, wave moves (`/api/game-master/move`), savvy quest resolution with **artifact prizes** (`/api/game-master/resolve-quest`). Same Bearer key as BAR Forge.

    **Game Master faces (canonical):** Shaman, Challenger, Regent, Architect, Diplomat, Sage.
    Pass optional `gameMasterFace` on match/registry; registry stores under `metadataJson.gameMasterFace`.

    **Custom GPT:** Route user turns through a face lens when helpful—Sage may delegate. Use `tags` and `x-gm-faces` as behavioral hints.
  version: 1.3.0
  x-gm-faces:
    shaman:
      mission: Mythic threshold — belonging, ritual space, bridge between worlds.
      gptHints: Ritualize BAR naming; prefer registry save + soft match; containment before stakes.
    challenger:
      mission: Proving ground — action, edge, lever.
      gptHints: Stress-test BAR; bias toward Show Up / stakes; smallest brave next move in metadata.
    regent:
      mission: Order — roles, rules, collective tool.
      gptHints: Classify BAR by lock/role; validate before POST registry; legible assignments.
    architect:
      mission: Blueprint — strategy, backlog, sys-admin teacher.
      gptHints: Decompose BAR; link registry ↔ quests/campaignRef; structured metadata.
    diplomat:
      mission: Weave — relational field, care, connector.
      gptHints: Reframe for I/We; enrich polarity[]; consent before persisting shared BARs.
    sage:
      mission: Integration — emergence; may wear other faces as masks.
      gptHints: Route which face leads; cross-face synthesis after match+registry; meta-routing.

servers:
  - url: https://bars-engine.vercel.app
    description: Production (no trailing slash; replace if needed)

tags:
  - name: GM_Shaman
    description: Belonging, ritual, threshold — registry & gentle matching
  - name: GM_Challenger
    description: Edge, proof, action — match with stakes; Show Up bias in prompts
  - name: GM_Regent
    description: Roles, rules — validate quest ids; ordered registry narrative
  - name: GM_Architect
    description: Structure, backlog — list registry; link BAR→quest→campaign in metadata
  - name: GM_Diplomat
    description: Relational field — polarity tags; care in copy before save
  - name: GM_Sage
    description: Routing & synthesis — default router; combine other tags in instructions
  - name: QuestCatalog
    description: Matchable quest rows + generated quest registry (CustomBar catalog and BAR Forge persistence)

security:
  - bearerAuth: []

paths:
  /api/match-bar-to-quests:
    post:
      operationId: matchBarToQuests
      summary: Match BAR analysis to quests (primary + up to 2 secondary)
      tags:
        - GM_Challenger
        - GM_Architect
        - GM_Sage
      x-gm-face-primary: challenger
      x-gm-face-notes: Weight prompts by face; optional gameMasterFace echoed in debug.matchedOn
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MatchBarRequest"
      responses:
        "200":
          description: Match result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MatchBarResponse"
        "400":
          description: Validation error
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
        "500":
          description: Server error

  /api/bar-registry:
    post:
      operationId: createBarRegistryRecord
      summary: Save BAR + analysis + optional quest ids to registry
      tags:
        - GM_Shaman
        - GM_Regent
        - GM_Diplomat
      x-gm-face-primary: shaman
      x-gm-face-notes: First-class BAR persistence; merge gameMasterFace into metadataJson
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BarRegistryRequest"
      responses:
        "200":
          description: Created id
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                required:
                  - id
        "400":
          description: Validation error or invalid quest ids
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
        "500":
          description: Server error
    get:
      operationId: listBarRegistryRecords
      summary: List all BAR registry rows (newest first)
      tags:
        - GM_Architect
        - GM_Sage
      x-gm-face-primary: architect
      x-gm-face-notes: Holistic catalog; metabolize BARs across the project
      parameters:
        - name: limit
          in: query
          description: Max rows when not using sample (default 100, max 500). Ignored when sample is set.
          schema:
            type: integer
            minimum: 1
            maximum: 500
        - name: sample
          in: query
          description: If set, return this many rows in random order (max 500). Use for "give me random BARs to work with."
          schema:
            type: integer
            minimum: 0
            maximum: 500
        - name: includeTotal
          in: query
          description: If 1 or true, include totalCount (all rows in DB). Use for "how many BARs in the registry?"
          schema:
            type: string
            enum:
              - "0"
              - "1"
              - "true"
              - "false"
      responses:
        "200":
          description: Registry list
          content:
            application/json:
              schema:
                type: object
                properties:
                  records:
                    type: array
                    items:
                      $ref: "#/components/schemas/BarRegistryRecord"
                  count:
                    type: integer
                    description: Number of rows in this response
                  totalCount:
                    type: integer
                    description: Present when includeTotal=1 — total rows in bar_forge_records
                required:
                  - records
                  - count
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /api/bar-registry/{id}:
    get:
      operationId: getBarRegistryRecord
      summary: Get one registry row by id
      tags:
        - GM_Architect
        - GM_Sage
      x-gm-face-primary: sage
      parameters:
        - name: id
          in: path
          required: true
          description: Registry record CUID
          schema:
            type: string
      responses:
        "200":
          description: Single record
          content:
            application/json:
              schema:
                type: object
                properties:
                  record:
                    $ref: "#/components/schemas/BarRegistryRecord"
                required:
                  - record
        "404":
          description: Not found
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /api/quests:
    get:
      operationId: listQuestCatalog
      summary: List matchable quests (canonical CustomBar catalog slice)
      description: |
        Filterable catalog for matcher and tools. Auth: Bearer (BARS_API_KEY), or session cookie when key unset (local dev).
      tags:
        - QuestCatalog
        - GM_Architect
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 500
        - name: campaignRef
          in: query
          description: Filter by CustomBar.campaignRef (e.g. bruised-banana)
          schema:
            type: string
        - name: questSource
          in: query
          description: Filter by CustomBar.questSource (e.g. system, bounty)
          schema:
            type: string
      responses:
        "200":
          description: Quest rows
          content:
            application/json:
              schema:
                type: object
                properties:
                  quests:
                    type: array
                    items:
                      $ref: "#/components/schemas/QuestDto"
                  count:
                    type: integer
                required:
                  - quests
                  - count
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createGeneratedQuestRegistry
      summary: Create generated quest registry entry (BAR Forge output)
      description: |
        Validates body with `CreateQuestSchema` (see `src/lib/generated-quest-registry/schema.ts`).
        Persists to `generated_quest_registry` with a stable id. `bookId` is optional; when set, must reference an existing book.
        Auth: Bearer (BARS_API_KEY) or logged-in session (same as GET catalog).
      tags:
        - QuestCatalog
        - GM_Architect
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GeneratedQuestRegistryCreate"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneratedQuestRegistryResponse"
        "400":
          description: Validation failed or unknown bookId
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          description: Persistence error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /api/quests/registry/{id}:
    get:
      operationId: getGeneratedQuestRegistryById
      summary: Get one generated quest registry row by id
      description: |
        Returns the same shape as `POST /api/quests` response. Auth: Bearer or session (same as catalog).
      tags:
        - QuestCatalog
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Registry id returned from POST /api/quests
      responses:
        "200":
          description: Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneratedQuestRegistryResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorBody"

  /api/game-master/collective-context:
    get:
      operationId: gameMasterCollectiveContext
      summary: Collective campaign snapshot (Kotter, domains, hub, narrative kernel)
      description: Query instanceId OR campaignRef. If multiple instances share campaignRef, pass instanceId.
      tags:
        - GM_Collective
        - GM_Architect
      x-gm-face-notes: Orient the user to where the collective is before resolving quests
      parameters:
        - name: instanceId
          in: query
          schema:
            type: string
          description: Instance CUID (one of instanceId or campaignRef required)
        - name: campaignRef
          in: query
          schema:
            type: string
          description: e.g. bruised-banana — must be unique or use instanceId
      responses:
        "200":
          description: Collective context
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollectiveContext"
        "400":
          description: Missing params or ambiguous campaignRef
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Instance not found
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /api/game-master/move:
    post:
      operationId: gameMasterMove
      summary: Wave move — per-face artifact-shaped drafts (optional player/campaign context)
      tags:
        - GM_Move
        - GM_Sage
      x-gm-face-notes: Use clean_up/wake_up for drafts; grow_up/show_up return stubs until fully implemented
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GameMasterMoveRequest"
      responses:
        "200":
          description: Per-face artifacts and meta (axis; patterns on wake_up)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GameMasterMoveResponse"
        "400":
          description: Validation error
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /api/game-master/resolve-quest:
    post:
      operationId: gameMasterResolveQuest
      summary: Savvy quest resolution — proposals with presenting face + artifact completion prize
      tags:
        - GM_Resolve
        - GM_Diplomat
        - GM_Sage
      x-gm-face-notes: Requires playerId, instanceId or campaignRef, and barRegistryIds and/or bars[]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResolveQuestRequest"
      responses:
        "200":
          description: Collective + player echo + ranked proposals
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResolveQuestResponse"
        "400":
          description: Validation error or ambiguous campaignRef
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Instance or player not found
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API key
      description: Value of BARS_API_KEY from server environment

  responses:
    Unauthorized:
      description: Missing or invalid Bearer token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorBody"
    ServiceUnavailable:
      description: BARS_API_KEY not configured on server
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorBody"

  schemas:
    ErrorBody:
      type: object
      properties:
        error:
          type: string

    GameMasterFace:
      type: string
      description: Canonical GM sect lens (see .agent/context/game-master-sects.md)
      enum:
        - shaman
        - challenger
        - regent
        - architect
        - diplomat
        - sage

    BarAnalysis:
      type: object
      properties:
        type:
          type: string
          enum:
            - perception
            - identity
            - relational
            - systemic
        wavePhase:
          type: string
          enum:
            - Wake Up
            - Clean Up
            - Grow Up
            - Show Up
        polarity:
          type: array
          items:
            type: string
      required:
        - type
        - wavePhase
        - polarity

    MatchBarRequest:
      type: object
      properties:
        bar:
          type: string
          minLength: 1
        analysis:
          $ref: "#/components/schemas/BarAnalysis"
        gameMasterFace:
          $ref: "#/components/schemas/GameMasterFace"
        options:
          type: object
          properties:
            maxResults:
              type: integer
              minimum: 1
              maximum: 100
      required:
        - bar
        - analysis

    QuestDto:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        status:
          type: string
        moveType:
          type: string
          nullable: true
        lockType:
          type: string
          nullable: true
        allyshipDomain:
          type: string
          nullable: true
        nation:
          type: string
          nullable: true
        archetype:
          type: string
          nullable: true
        kotterStage:
          type: integer
        createdAt:
          type: string
      required:
        - id
        - title
        - description
        - status
        - kotterStage
        - createdAt

    MatchBarResponse:
      type: object
      properties:
        primary:
          oneOf:
            - $ref: "#/components/schemas/QuestDto"
            - type: "null"
        secondary:
          type: array
          items:
            $ref: "#/components/schemas/QuestDto"
        debug:
          type: object
          properties:
            matchedOn:
              type: array
              items:
                type: string
            confidence:
              type: number
          required:
            - matchedOn
            - confidence
      required:
        - primary
        - secondary
        - debug

    BarRegistryMatches:
      type: object
      properties:
        primaryQuestId:
          type: string
        secondaryQuestIds:
          type: array
          maxItems: 2
          items:
            type: string

    BarRegistryRequest:
      type: object
      properties:
        bar:
          type: string
          minLength: 1
        analysis:
          $ref: "#/components/schemas/BarAnalysis"
        gameMasterFace:
          $ref: "#/components/schemas/GameMasterFace"
        matches:
          $ref: "#/components/schemas/BarRegistryMatches"
        source:
          type: string
        metadataJson:
          type: object
          additionalProperties: true
      required:
        - bar
        - analysis

    BarRegistryRecord:
      type: object
      properties:
        id:
          type: string
        bar:
          type: string
        analysisType:
          type: string
        wavePhase:
          type: string
        polarity:
          type: array
          items:
            type: string
        primaryQuestId:
          type: string
          nullable: true
        secondaryQuestIds:
          type: array
          items:
            type: string
        source:
          type: string
          nullable: true
        metadataJson:
          nullable: true
        createdAt:
          type: string
      required:
        - id
        - bar
        - analysisType
        - wavePhase
        - polarity
        - secondaryQuestIds
        - createdAt

    GmWaveMove:
      type: string
      enum:
        - wake_up
        - clean_up
        - grow_up
        - show_up

    PlayerQuestContext:
      type: object
      description: Grounds GM move in player + campaign reality (optional on /api/game-master/move)
      properties:
        instanceId:
          type: string
        campaignRef:
          type: string
        playerId:
          type: string
        nationKey:
          type: string
        archetypeKey:
          type: string
        charge:
          type: object
          properties:
            text:
              type: string
            sourceBarId:
              type: string
        barRegistryIds:
          type: array
          items:
            type: string
        bars:
          type: array
          items:
            type: object
            required:
              - bar
              - analysis
            properties:
              bar:
                type: string
                minLength: 1
              analysis:
                $ref: "#/components/schemas/BarAnalysis"

    GameMasterMoveRequest:
      type: object
      required:
        - bar
        - analysis
        - move
        - gameMasters
      properties:
        bar:
          type: string
          minLength: 1
        analysis:
          $ref: "#/components/schemas/BarAnalysis"
        move:
          $ref: "#/components/schemas/GmWaveMove"
        gameMasters:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/GameMasterFace"
        options:
          type: object
          properties:
            maxArtifacts:
              type: integer
              minimum: 0
        context:
          $ref: "#/components/schemas/PlayerQuestContext"

    GmArtifact:
      type: object
      description: Quest completion prize or GM draft artifact
      required:
        - type
        - title
        - description
        - instructions
        - charge
      properties:
        id:
          type: string
        type:
          type: string
        title:
          type: string
        description:
          type: string
        instructions:
          type: array
          items:
            type: string
        charge:
          type: string
        riskLevel:
          type: string
          enum:
            - low
            - medium
            - high
        domain:
          type: string
          enum:
            - internal
            - relational
            - systemic
        questId:
          type: string
        sourceFace:
          $ref: "#/components/schemas/GameMasterFace"

    GameMasterMoveResponse:
      type: object
      required:
        - bar
        - move
        - artifacts
        - meta
      properties:
        bar:
          type: string
        move:
          type: string
        artifacts:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/GmArtifact"
        meta:
          type: object
          properties:
            axis:
              type: object
              properties:
                communion:
                  type: array
                  items:
                    $ref: "#/components/schemas/GameMasterFace"
                agency:
                  type: array
                  items:
                    $ref: "#/components/schemas/GameMasterFace"
            patterns:
              description: Present on wake_up — registry pattern summary
              type: object
              additionalProperties: true

    QuestProposal:
      type: object
      required:
        - questId
        - presentingFace
        - artifactPrize
      properties:
        questId:
          type: string
        presentingFace:
          $ref: "#/components/schemas/GameMasterFace"
        artifactPrize:
          $ref: "#/components/schemas/GmArtifact"
        rationale:
          type: array
          items:
            type: string
        sceneHint:
          type: string

    ResolveQuestRequest:
      type: object
      required:
        - playerId
      properties:
        instanceId:
          type: string
        campaignRef:
          type: string
        playerId:
          type: string
        charge:
          type: object
          properties:
            text:
              type: string
            sourceBarId:
              type: string
        barRegistryIds:
          type: array
          items:
            type: string
        bars:
          type: array
          items:
            type: object
            required:
              - bar
              - analysis
            properties:
              bar:
                type: string
                minLength: 1
              analysis:
                $ref: "#/components/schemas/BarAnalysis"
        nationKey:
          type: string
        archetypeKey:
          type: string
        options:
          type: object
          properties:
            maxProposals:
              type: integer
              minimum: 1
              default: 3
            preferFaces:
              type: array
              items:
                $ref: "#/components/schemas/GameMasterFace"

    ResolveQuestResponse:
      type: object
      required:
        - collective
        - player
        - proposals
        - meta
      properties:
        collective:
          type: object
          properties:
            kotterStage:
              type: integer
            allyshipDomain:
              type: string
              nullable: true
            campaignRef:
              type: string
              nullable: true
        player:
          type: object
          properties:
            nationKey:
              type: string
              nullable: true
            archetypeKey:
              type: string
              nullable: true
        proposals:
          type: array
          items:
            $ref: "#/components/schemas/QuestProposal"
        meta:
          type: object
          properties:
            axis:
              type: object
              properties:
                communion:
                  type: array
                  items:
                    $ref: "#/components/schemas/GameMasterFace"
                agency:
                  type: array
                  items:
                    $ref: "#/components/schemas/GameMasterFace"

    CollectiveContext:
      type: object
      properties:
        instanceId:
          type: string
        campaignRef:
          type: string
          nullable: true
        kotterStage:
          type: integer
        allyshipDomain:
          type: string
          nullable: true
        primaryCampaignDomain:
          type: string
          nullable: true
        campaignHubState:
          type: object
          additionalProperties: true
        narrativeKernel:
          type: string
          nullable: true

    GeneratedQuestTransformationMove:
      type: object
      description: Stabilization or expression leg (from / to / move)
      required:
        - from
        - to
        - move
      properties:
        from:
          type: string
          minLength: 1
        to:
          type: string
          minLength: 1
        move:
          type: string
          minLength: 1

    GeneratedQuestTranslationTransformation:
      type: object
      description: Translation leg (includes path)
      required:
        - path
        - from
        - to
        - move
      properties:
        path:
          type: string
          minLength: 1
        from:
          type: string
          minLength: 1
        to:
          type: string
          minLength: 1
        move:
          type: string
          minLength: 1

    GeneratedQuestRegistryStep:
      type: object
      required:
        - phase
        - instruction
      properties:
        phase:
          type: string
          enum:
            - stabilization
            - translation
            - expression
        instruction:
          type: string
          minLength: 1

    GeneratedQuestRegistryCreate:
      type: object
      description: |
        Request body for POST /api/quests. Mirrors Zod CreateQuestSchema in src/lib/generated-quest-registry/schema.ts
      required:
        - title
        - status
        - chapter
        - moveType
        - source
        - bar
        - transformation
        - steps
      properties:
        title:
          type: string
          minLength: 1
        status:
          type: string
          enum:
            - draft
            - active
            - archived
        chapter:
          type: integer
          minimum: 1
        moveType:
          type: string
          enum:
            - generated
            - library
            - manual
        source:
          type: object
          required:
            - kind
          properties:
            kind:
              type: string
              minLength: 1
            label:
              type: string
              minLength: 1
        bar:
          type: object
          required:
            - label
            - type
            - emotionalChannel
            - emotionalState
          properties:
            label:
              type: string
              minLength: 1
            type:
              type: string
              enum:
                - perception
                - identity
                - relational
                - systemic
            polarity:
              type: string
              minLength: 1
            emotionalChannel:
              type: string
              enum:
                - anger
                - fear
                - sadness
                - joy
                - neutral
            emotionalState:
              type: string
              minLength: 1
            wavePhases:
              type: array
              items:
                type: string
        transformation:
          type: object
          required:
            - stabilization
            - translation
            - expression
          properties:
